<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#EF1C16" />
  <title>Core Admin — Caja Cusco</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="login-card">
      <h1>Core Admin Caja Cusco</h1>
      <p>Panel web unificado: Fuerza de Ventas + Portal Cliente (Firestore).</p>
      <div id="loginError" class="error hidden"></div>
      <label for="email">Correo o código de empleado</label>
      <input id="email" type="text" placeholder="0101-1 o 0101-1@cajacusco.com" autocomplete="username" />
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <button id="loginBtn" type="button">Ingresar al core</button>
      <p class="login-hint">
        Acceso: rol <strong>administrador</strong> o <strong>supervisor</strong>.
        Ejemplo: <strong>0101-1</strong> (Luis Enrique) o <strong>0303-3</strong>.
      </p>
    </div>
  </div>

  <div id="appView" class="app-shell hidden">
    <aside class="sidebar">
      <div class="sidebar-brand-bar"><span>Caja Cusco</span></div>
      <div class="brand-sub">Core administrativo</div>
      <button class="nav-btn active" data-view="resumen">Resumen</button>
      <button class="nav-btn" data-view="clientes">Clientes</button>
      <button class="nav-btn" data-view="solicitudes">Solicitudes</button>
      <button class="nav-btn" data-view="creditos">Créditos</button>
      <button class="nav-btn" data-view="portal">Portal Cliente</button>
      <button class="nav-btn" data-view="usuarios">Usuarios ventas</button>
      <button class="nav-btn" data-view="cartera">Cartera diaria</button>
      <button id="logoutBtn" class="nav-btn secondary" style="margin-top:24px">Cerrar sesión</button>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2 id="viewTitle">Resumen</h2>
        <div class="user-chip" id="userChip"></div>
      </div>
      <div class="main-body" id="content"></div>
    </main>
  </div>

  <script type="module" src="app.js?v=3"></script>
</body>
</html>
